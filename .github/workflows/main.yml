name: Gold Price Tracker 1h

on:
  schedule:
    - cron: '0 * * * *' # QUAN TRỌNG: Lệnh này ép cỗ máy tự chạy vào phút thứ 0 của mỗi tiếng
  workflow_dispatch: # Cho phép anh bấm nút tự chạy thủ công bất cứ lúc nào để kiểm tra

permissions:
  contents: write # BẮT BUỘC: Cấp quyền tối cao cho con Bot được ghi dữ liệu vào file .csv

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update giá vàng theo giờ"
          file_pattern: "gold_market_log.csv"
