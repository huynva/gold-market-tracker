name: Gold Price Tracker

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kéo mã nguồn về máy chủ
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # YÊU CẦU LÕI: Kéo toàn bộ lịch sử để chống dội ngược dữ liệu

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt thư viện
        run: pip install -r requirements.txt

      - name: Chạy động cơ cào dữ liệu
        run: python scraper.py

      - name: Commit và Đẩy file CSV mới lên Repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto-update giá vàng" || exit 0 
          git pull --rebase origin main 
          git push
