name: Gold Price Tracker

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kéo mã nguồn về máy chủ
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt thư viện
        run: pip install -r requirements.txt

      - name: Chạy động cơ cào dữ liệu
        run: python scraper.py

      - name: Trạm gộp dữ liệu tự động (Chống đụng độ)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update giá vàng"
          file_pattern: "gold_market_log.csv"
